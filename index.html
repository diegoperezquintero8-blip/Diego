<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calendario de Lanzamientos</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    background:#f1f3f4;
    font-family:Arial,sans-serif;
}

header{
    background:#1a73e8;
    color:white;
    padding:20px;
    text-align:center;
}

#calendar{
    max-width:1200px;
    margin:20px auto;
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.fc-toolbar-title{
    font-size:2rem !important;
    font-weight:bold;
    text-transform:capitalize;
}

.fc-col-header-cell{
    background:#f8f9fa;
    padding:10px 0;
}

.fc-daygrid-day-number{
    font-size:18px;
    font-weight:bold;
    color:#202124;
}

.fc-event{
    background:#fbbc04 !important;
    border:none !important;
    color:black !important;
    font-weight:bold;
    border-radius:5px !important;
}

#overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    z-index:999;
}

#popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    width:90%;
    max-width:350px;
    padding:20px;
    border-radius:12px;
    z-index:1000;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

#popup h2{
    margin-top:0;
}

#popup button{
    background:#1a73e8;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>
<body>

<header>
    <h1>Diego Pérez Quintero</h1>
    <p>Calendario de Lanzamientos</p>
</header>

<div id="calendar"></div>

<div id="overlay"></div>

<div id="popup">
    <h2 id="titulo"></h2>
    <p id="descripcion"></p>
    <button onclick="cerrarPopup()">Cerrar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script>

document.addEventListener('DOMContentLoaded', function(){

    const calendar = new FullCalendar.Calendar(
        document.getElementById('calendar'),
        {

            locale:'es',

            initialView:'dayGridMonth',

            fixedWeekCount:false,

            headerToolbar:{
                left:'prev,next today',
                center:'title',
                right:''
            },

            titleFormat:{
                year:'numeric',
                month:'long'
            },

            dayHeaderFormat:{
                weekday:'long'
            },

            events:[

                {
                    title:'Lanzamiento',
                    start:'2026-07-01',
                    description:'Predicción LaLiga 2025-26'
                },

                {
                    title:'Lanzamiento',
                    start:'2026-07-10',
                    description:'Vídeo especial del Teide'
                },

                {
                    title:'Lanzamiento',
                    start:'2026-07-15',
                    description:'Predicción Liga Hypermotion'
                }

            ],

            eventClick:function(info){

                document.getElementById('titulo').innerText =
                    info.event.title;

                document.getElementById('descripcion').innerText =
                    info.event.extendedProps.description;

                document.getElementById('overlay').style.display='block';
                document.getElementById('popup').style.display='block';
            }

        });

    calendar.render();

});

function cerrarPopup(){
    document.getElementById('overlay').style.display='none';
    document.getElementById('popup').style.display='none';
}

</script>

</body>
</html>
