<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario de Lanzamientos</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0a2342;
    color:white;
}

header{
    background:#003366;
    padding:25px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:2rem;
}

header p{
    margin-top:10px;
}

#calendar{
    max-width:1000px;
    margin:25px auto;
    background:white;
    border-radius:15px;
    padding:15px;
}

.fc-toolbar-title{
    font-size:2rem !important;
    font-weight:bold;
    text-transform:capitalize;
}

.fc-event{
    background:#ffd700 !important;
    border:none !important;
    color:black !important;
    font-weight:bold;
}

#overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.7);
    z-index:999;
}

#popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:black;
    padding:20px;
    border-radius:15px;
    width:320px;
    z-index:1000;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

#popup h2{
    margin-top:0;
}

#popup button{
    padding:10px 20px;
    border:none;
    background:#003366;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<header>
    <h1>Diego Pérez Quintero</h1>
    <p>Calendario de Lanzamientos</p>
</header>

<div id="calendar"></div>

<div id="overlay"></div>

<div id="popup">
    <h2 id="titulo"></h2>
    <p id="descripcion"></p>
    <button onclick="cerrarPopup()">Cerrar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script>

document.addEventListener('DOMContentLoaded', function () {

    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {

        locale: 'es',

        initialView: 'dayGridMonth',

        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: ''
        },

        titleFormat: {
            year: 'numeric',
            month: 'long'
        },

        events: [

            {
                title: 'Lanzamiento',
                start: '2026-07-01',
                description: 'Predicción LaLiga 2025-26'
            },

            {
                title: 'Lanzamiento',
                start: '2026-07-10',
                description: 'Vídeo especial sobre el Teide'
            },

            {
                title: 'Lanzamiento',
                start: '2026-07-15',
                description: 'Predicción Liga Hypermotion'
            }

        ],

        eventClick: function(info){

            document.getElementById("titulo").innerText =
                info.event.title;

            document.getElementById("descripcion").innerText =
                info.event.extendedProps.description;

            document.getElementById("popup").style.display = "block";
            document.getElementById("overlay").style.display = "block";
        }

    });

    calendar.render();

});

function cerrarPopup(){
    document.getElementById("popup").style.display = "none";
    document.getElementById("overlay").style.display = "none";
}

</script>

</body>
