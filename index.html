<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diego Pérez Quintero</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f1f3f4;
}

header{
background:#0b57d0;
color:white;
text-align:center;
padding:20px;
}

nav{
background:#003366;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:0 10px;
font-weight:bold;
}

nav a:hover{
color:#ffd700;
}

.seccion{
max-width:1200px;
margin:20px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

#calendar{
max-width:1200px;
margin:20px auto;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

.fc-toolbar-title{
font-size:2rem !important;
font-weight:bold;
text-transform:capitalize;
}

.fc-event{
background:#ffd54f !important;
border:none !important;
color:black !important;
font-weight:bold;
border-radius:5px !important;
}

/* POPUP */

#overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
z-index:999;
}

#popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
width:90%;
max-width:400px;
padding:20px;
border-radius:15px;
z-index:1000;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

#popup h2{
margin-bottom:10px;
}

#popup button{
background:#0b57d0;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
margin-top:15px;
}

</style>
</head>

<body>

<header>
<h1>Diego Pérez Quintero</h1>
<p>Calendario de Lanzamientos</p>
</header>

<nav>
<a href="#" onclick="mostrarCalendario()">📅 Calendario</a>
<a href="#" onclick="mostrarVideos()">🎥 Vídeos</a>
<a href="#" onclick="mostrarTenerife()">⚽ Tenerife</a>
<a href="#" onclick="mostrarSobreMi()">ℹ️ Sobre mí</a>
</nav>

<div id="calendar"></div>

<div id="videos" class="seccion" style="display:none;">
<h2>🎥 Vídeos</h2>
<p>Aquí aparecerán tus vídeos de YouTube.</p>
</div>

<div id="tenerife" class="seccion" style="display:none;">
<h2>⚽ CD Tenerife</h2>
<p>Noticias y contenido sobre el Tenerife.</p>
</div>

<div id="sobremi" class="seccion" style="display:none;">
<h2>ℹ️ Sobre mí</h2>
<p>Soy Diego Pérez Quintero.</p>
<p>¡Gracias por suscribirte!</p>
</div>

<!-- Popup -->

<div id="overlay"></div>

<div id="popup">
<h2 id="tituloPopup"></h2>
<p id="textoPopup"></p>
<button onclick="cerrarPopup()">Cerrar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script>

function ocultarTodo(){
document.getElementById('calendar').style.display='none';
document.getElementById('videos').style.display='none';
document.getElementById('tenerife').style.display='none';
document.getElementById('sobremi').style.display='none';
}

function mostrarCalendario(){
ocultarTodo();
document.getElementById('calendar').style.display='block';
}

function mostrarVideos(){
ocultarTodo();
document.getElementById('videos').style.display='block';
}

function mostrarTenerife(){
ocultarTodo();
document.getElementById('tenerife').style.display='block';
}

function mostrarSobreMi(){
ocultarTodo();
document.getElementById('sobremi').style.display='block';
}

function cerrarPopup(){
document.getElementById('overlay').style.display='none';
document.getElementById('popup').style.display='none';
}

document.addEventListener('DOMContentLoaded', function(){

var calendar = new FullCalendar.Calendar(
document.getElementById('calendar'),
{

locale:'es',

initialView:'dayGridMonth',

fixedWeekCount:false,

headerToolbar:{
left:'prev,next today',
center:'title',
right:''
},

titleFormat:{
year:'numeric',
month:'long'
},

dayHeaderFormat:{
weekday:'long'
},

events:[

{
title:'Lanzamiento',
start:'2026-07-01',
extendedProps:{
titulo:'Predicción LaLiga 2025-26',
texto:'Mi predicción completa para LaLiga.'
}
},

{
title:'Lanzamiento',
start:'2026-07-10',
extendedProps:{
titulo:'Vídeo del Teide',
texto:'Nuevo vídeo especial sobre el Teide.'
}
},

{
title:'Lanzamiento',
start:'2026-07-15',
extendedProps:{
titulo:'Liga Hypermotion',
texto:'Predicción completa de la Liga Hypermotion.'
}
}

],

eventClick:function(info){

document.getElementById('tituloPopup').innerText =
info.event.extendedProps.titulo;

document.getElementById('textoPopup').innerText =
info.event.extendedProps.texto;

document.getElementById('overlay').style.display='block';
document.getElementById('popup').style.display='block';

}

}
);

calendar.render();

mostrarCalendario();

});

</script>

</body>
</html>
