<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diego Pérez Quintero</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f1f3f4;
}

header{
background:#0b57d0;
color:white;
padding:20px;
text-align:center;
}

#calendar{
max-width:1200px;
margin:20px auto;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

.fc-toolbar-title{
font-size:2rem !important;
font-weight:bold;
text-transform:capitalize;
}

.fc-event{
background:#ffd54f !important;
border:none !important;
color:black !important;
font-weight:bold;
}

#detalle{
display:none;
max-width:1000px;
margin:20px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.15);
}

#detalle h1{
color:#0b57d0;
}

.boton{
background:#0b57d0;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.boton:hover{
opacity:.9;
}

</style>
</head>

<body>

<header>
<h1>Diego Pérez Quintero</h1>
<p>Calendario de Lanzamientos</p>
</header>

<div id="calendar"></div>

<div id="detalle">

<h1 id="tituloDetalle"></h1>

<p id="textoDetalle"></p>

<button class="boton" onclick="volverCalendario()">
⬅ Volver al calendario
</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script>

document.addEventListener('DOMContentLoaded', function() {

const calendar = new FullCalendar.Calendar(
document.getElementById('calendar'),

{
locale:'es',

initialView:'dayGridMonth',

headerToolbar:{
left:'prev,next today',
center:'title',
right:''
},

titleFormat:{
year:'numeric',
month:'long'
},

dayHeaderFormat:{
weekday:'long'
},

events:[

{
title:'Lanzamiento',
start:'2026-07-01',
extendedProps:{
titulo:'Predicción LaLiga 2025-26',
texto:'Aquí puedes escribir toda la información sobre tu predicción de LaLiga, clasificación final, equipos revelación y decepciones.'
}
},

{
title:'Lanzamiento',
start:'2026-07-10',
extendedProps:{
titulo:'Vídeo Especial del Teide',
texto:'Aquí puedes poner información sobre tu vídeo del Teide, curiosidades, teorías o próximos proyectos.'
}
},

{
title:'Lanzamiento',
start:'2026-07-15',
extendedProps:{
titulo:'Predicción Liga Hypermotion',
texto:'Aquí puedes explicar tus predicciones para la Liga Hypermotion y los posibles ascensos.'
}
}

],

eventClick:function(info){

document.getElementById('calendar').style.display='none';

document.getElementById('detalle').style.display='block';

document.getElementById('tituloDetalle').innerText =
info.event.extendedProps.titulo;

document.getElementById('textoDetalle').innerText =
info.event.extendedProps.texto;

}

});

calendar.render();

});

function volverCalendario(){

document.getElementById('detalle').style.display='none';

document.getElementById('calendar').style.display='block';

}

</script>

</body>
</html>
